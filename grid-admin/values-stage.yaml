appName: grid-admin
nameSuffix: stage
forReal: false

timezone: Asia/Riyadh
lang: en_US.UTF-8

replicas: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

registryHost: me-riyadh-1.ocir.io
registryProjectName: axlo4g31gl45  # TODO: confirm project name

spring:
  image:
    name: grid-admin-stage  # TODO: confirm image name after ImageCopier setup
    tag: develop             # TODO: update to actual image tag after first build
    pullPolicy: Always
  containerPort: 8081
  service:
    port: 80
    type: LoadBalancer
  profile: postgres
  pinpointEnabled: true
  pinpointSampleRate: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

db:
  url: "jdbc:postgresql://<DB_HOST>:5432/gridadmin"  # TODO: fill in actual DB host
  username: "grid"                                    # TODO: fill in actual username
  password: "<DB_PASSWORD>"                          # TODO: fill in actual password

backstage:
  signatureEnabled: "true"
  hostSecurityKey: "<BACKSTAGE_HOST_SECURITY_KEY>"  # TODO: fill in actual key

sidecar:
  name: wasl-proxy-sidecar
  image: me-riyadh-1.ocir.io/axlo4g31gl45/wasl-sidecar-proxy:260114-1913

imagePullSecrets: "mapservice-ocir-read"

nodeSelector:
  kubernetes.io/arch: amd64

ncc:
  application: grid-admin
  instance: grid-admin
  version: 1
  installation: 2026-0101-0001  # TODO: update to actual installation ID

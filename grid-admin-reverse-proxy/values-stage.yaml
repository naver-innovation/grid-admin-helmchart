appName: grid-admin-reverse-proxy
nameSuffix: stage
forReal: false

timezone: Asia/Riyadh
lang: en_US.UTF-8

replicas: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

registryHost: me-riyadh-1.ocir.io
registryProjectName: axlo4g31gl45

spring:
  image:
    name: grid-admin-reverse-proxy-stage
    tag: feature-NCCT_MAPS_PLATFORM-1019
    pullPolicy: Always
  containerPort: 8080
  service:
    port: 80
    type: LoadBalancer
  pinpointEnabled: true
  pinpointSampleRate: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

gateway:
  backendUri: "http://grid-admin-api-mapservice.stage-svc-ruh-1.naver-innovation.net/"  
  frontendUri: "http://grid-admin-web-mapservice.stage-svc-ruh-1.naver-innovation.net/" 
  signatureEnabled: "true"
  hostSecurityKey: "<GATEWAY_HOST_SECURITY_KEY>"  # TODO: fill in actual key
  insecureTls: "true"

sidecar:
  name: wasl-proxy-sidecar
  image: me-riyadh-1.ocir.io/axlo4g31gl45/wasl-sidecar-proxy:260114-1913

imagePullSecrets: "mapservice-ocir-read"

nodeSelector:
  kubernetes.io/arch: amd64

ncc:
  application: grid-admin-reverse-proxy
  instance: grid-admin-reverse-proxy
  version: 1
  installation: 2026-0101-0001  # TODO: update to actual installation ID

{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "default.name" . }}-spc
  labels:
{{ include "ncc.labels" . | indent 4 }}
spec:
  provider: oci
  parameters:
    authType: workload
    vaultId: {{ .Values.secretProviderClass.vaultId | quote }}
    secrets: |
      - name: {{ .Values.secretProviderClass.dbPasswordSecretName | quote }}
  secretObjects:
  - secretName: {{ include "default.name" . }}-oci-secret
    type: Opaque
    data:
    - key: DB_PASSWORD
      objectName: {{ .Values.secretProviderClass.dbPasswordSecretName | quote }}
{{- end }}
